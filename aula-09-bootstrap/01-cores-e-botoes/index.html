<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Introdução ao Bootstrap - Cores</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body>
    <main>
        <section>
            <h1>Cores no Bootstrap</h1>
            <div>
                <p class="h3 text-muted">Classe text-muted</p>
                <p class="h3 text-primary">Classe text-primary</p>
                <p class="h2 text-success">Classe text-success</p>
                <p class="h2 text-info">Classe text-info</p>
                <p class="h2 text-warning">Classe text-warning</p>
                <p class="h2 text-danger">Classe text-danger</p>
                <p class="h2 text-secondary">Classe text-secondary</p>
                <hr>
                <section>
                    <h1>Botões no bootstrap</h1>
                    <button type="button" class="btn">Normal</button> <br>  <br>
                    <button type="button" class="btn btn-primary">Primário</button><br><br>
                    <button type="button" class="btn btn-secondary">secundário</button><br><br>
                    <button type="button" class="btn btn-success">successo</button><br><br>
                    <button type="button" class="btn btn-info">informação</button><br><br>
                    <button type="button" class="btn btn-warning">alerta</button><br><br>
                    <button type="button" class="btn btn-danger">perigo</button><br><br>
                    <button type="button" class="btn btn-dark">dark</button><br><br>
                    <button type="button" class="btn btn-light">Light</button><br><br>
                    <button type="button" class="btn btn-outline-danger">alerta outline</button><br><br>
                    <button type="button" class="btn btn-outline-primary">alerta outline</button><br><br>
                    <button type="button" class="btn btn-outline-success btn-lg">Enviar</button><br><br>
                    <button type="button" class="btn btn-outline-success btn-sm">Enviar</button><br><br>
                </section>
                <hr>
            </div>
        </section>
    </main>
</body>
<!-- Imporatando o javascript do bootstrap -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js" integrity="sha384-0pUGZvbkm6XF6gxjEnlmuGrJXVbNuzT9qBBavbLwCsOGabYfZo0T0to5eqruptLy" crossorigin="anonymous"></script>
<!-- Importamos scripts embaixo do body para melhorar o desempenho de carregamento da página -->
</html>
