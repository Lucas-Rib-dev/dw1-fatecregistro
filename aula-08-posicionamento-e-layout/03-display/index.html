<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Display</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Exemplos da propriedade DISPLAY</h1>

    <h2>Display: block</h2>
    <div class="block">Bloco 1</div>
    <div class="block">Bloco 2</div>
    <h2>Display: inline</h2>
    <!-- span cria um espaço na página -->
    <span class="inline">Inline 1</span>
    <span class="inline">Inline 2</span>
    <span class="inline">Inline 3</span>
    <span class="inline">Inline 4</span>
    <span class="inline">Inline 5</span>
    <span class="inline">Inline 6</span>
    <span class="inline">Inline 7</span>
    <span class="inline">Inline 8</span>
    <span class="inline">Inline 9</span>

    <h2>Display: Inline-block</h2>
    <div class="inline-block">Inline-block1</div>
    <div class="inline-block">Inline-block2</div>
    
</body>
</html>
