<!-- Estrutura Básica HTML -->
<!doctype html>
<!-- diz ao navegador para utilizar a ultima versao do html -->
<html lang="pt-br">
  <!-- atributo lang informa o idioma do site -->
  <!-- no head irão as metatags (metadados-informações do site) -->
  <head>
    <!-- charset indica o conjunto de caracteres -->
    <meta charset="UTF-8" />
    <!-- permite apresentar uma melhor visualização em dispositivos móveis -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- título exibido na barra do navegador -->
    <title>Meu website</title>
  </head>
  <!-- conteudo do site - o que o usuario ira visualizar-->
  <body>
    <h1>Meu site</h1>
    <p>Bem-vindo ao meu site!</p>
  </body>
</html>
