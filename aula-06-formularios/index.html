<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Cadastro</title>
    <style>
        header {
            font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
        }
    </style>
</head>
<body>
    <header>
        <h1>Formulário de Cadastro</h1>
    </header>
    <main>
        <section>
            <!-- Formulário de Cadastro -->
             <form action="sucesso.html" method="POST">
                <fieldset>
                    <legend>Dados pessoais</legend>
                    <label for="nome">Nome:</label> <br>
                    <input type="text" name="Nome" id="nome" placeholder="Insira o seu nome completo" required> <br>
                    <label for="email">E-mail:</label> <br>
                    <input type="email" name="email" id="email" placeholder="Insira seu E-mail" required> <br>
                    <label for="password">Senha:</label><br>
                    <input type="password" name="password" id="password" placeholder="Senha" required> 
                    <br>
                    <label for="nascimento">Data de nascimento:</label> <br>
                    <input type="date" name="nascimento" id="nascimento"> <br>
                    <label for="sexo">Sexo:</label>
                    <input type="radio" name="sexo" id="masc" value="m">Masculino
                    <input type="radio" name="sexo" id="fem" value="f">Feminino
                    <fieldset>
                        <legend>Dados do produto:</legend>
                        <label for="quantidade">Quantidade:</label> <br>
                        <input type="number" name="quantidade" id="quantidade" min="1"><br>
                        <label for="cor">Cor:</label> <br>
                        <input type="color"> <br>
                        <label for="entrega">Agendar entrega para data:</label> <br>
                        <input type="datetime-local" name="" id=""><br>
                        <label for="frete">Selecione o frete:</label><br>
                        <select name="frete" id="frete">
                            <option value="PAC">PAC</option>
                            <option value="sedex">Sedex</option>
                            <option value="sedex10">Sedex10</option>
                        </select>
                        <br><br>
                        <label for="observaçoes">Observações:</label> <br>
                        <textarea rows="4" cols="40" name="observacoes" id="observacoes" placeholder="Escreva aqui observações sobre o produto"></textarea>
                        <br><br>
                        <input type="checkbox" name="termos" id="termos">
                        Li e aceito os termos de uso da plataforma.
                        <br><br>
                        <a href="termos.html">

                        
                        <button type="button">Ler os termos de uso</button><br>
                        </a>
                        <br> <br> <hr> <br>
                        <button type="submit">Enviar</button>
                        <button type="reset">Limpar</button>
                    </fieldset>

                </fieldset>
             </form>
        </section>
    </main>
</body>
</html>
